    ПАРАМЕТРЫ:
    • Режим: каждый день
    • Каналы: чат и звонок
    • Сценарий: оперативное решение кассовых сбоев
- topic: support_quick_response_001
  priority: 7
  keywords:
  - ответ через сутки
  - вопрос не актуален
  - долгий ответ
  - быстрый ответ
