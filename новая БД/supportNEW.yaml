sections:
- topic: support_response_time_001
  priority: 7
  keywords:
  - поддержка не отвечает
  - два дня жду
  - долго отвечают
  - время ответа
  - ждать ответа
  facts: |
    Техподдержка Wipon работает ежедневно, даёт быстрый первичный отклик и принимает срочные обращения через чат.

    ПАРАМЕТРЫ:
    • Режим: ежедневно, включая выходные
    • Формат ответа: быстрый первичный отклик
    • Срочный канал: обращение в чат
