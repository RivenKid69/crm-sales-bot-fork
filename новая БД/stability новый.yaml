sections:
- topic: stability_freezing_001
  priority: 8
  keywords:
  - зависает
  - зависание
  - виснет
  - тормозит
  - программа учёта
  - программа зависает
  - лагает
  - фризит
  - касса тормозит
  - медленно работает
  - долго загружается
  - подвисает
  facts: |
    Зависание или торможение системы — обычно связано с устройством или качеством интернета.

    ПАРАМЕТРЫ:
    • Тип проблемы: зависание/торможение
    • Типовые причины: устройство или интернет
    • Сохранность данных: данные не теряются
- topic: stability_data_loss_001
  priority: 8
  keywords:
  - информация слетела
  - данные пропали
  - потерялись данные
  - вбивать заново
  - восстановление данных
  - данные слетели
  facts: |
    Потеря данных при сбое — система автоматически сохраняет данные и восстанавливает их при запуске.

    ПАРАМЕТРЫ:
    • Автосохранение: включено
    • Восстановление после перезапуска: выполняется автоматически
    • Результат: данные не пропадают
- topic: stability_offline_001
  priority: 8
  keywords:
  - удалённые регионы
  - нет связи
  - без интернета
  - офлайн
  - offline
  - облачный учёт
  - зависнет без интернета
  - работа без сети
  facts: |
    Офлайн-режим Wipon — продажи продолжаются без интернета с последующей синхронизацией.

    ПАРАМЕТРЫ:
    • Работа без интернета: да
    • Сохранение продаж: локально во время офлайна
    • Синхронизация: после восстановления связи
- topic: stability_update_issue_001
  priority: 7
  keywords:
  - обновление
  - после обновления
  - перестало открываться
  - не открывается
  - апдейт
  - обновили программу
  - сломалось после обновления
  facts: |
    Проблема после обновления — базово обновления тестируются, при сбое нужен стандартный порядок проверки.

    ПАРАМЕТРЫ:
    • Подход к обновлениям: предварительное тестирование
    • Первый шаг: перезапуск программы
    • Эскалация: обращение в поддержку, если проблема не ушла
- topic: stability_update_issue_002
  priority: 7
  keywords:
  - после обновления ломается
  - касса не открывается
  - товар не пробивается
  - обновление сломало
  - баг после обновления
  facts: |
    Сбой кассы после обновления — редкий сценарий, требует быстрой проверки через поддержку.

    ПАРАМЕТРЫ:
    • Влияние обновлений на кассу: обычно не влияют
    • Вероятность сбоев: редкая
    • Действие при проблеме: сразу сообщить в поддержку
- topic: stability_update_timing_001
  priority: 6
  keywords:
  - обновления в рабочее время
  - мешают продавать
  - подвисает
  - клиенты ждут
  - обновление во время работы
  - апдейт мешает
  facts: |
    Обновления в рабочее время — установка в фоне без остановки кассовых операций.

    ПАРАМЕТРЫ:
    • Режим установки: фоновый
    • Влияние на кассу: касса не останавливается
    • Продажи во время обновления: продолжаются без задержек
- topic: stability_transfer_slow_001
  priority: 6
  keywords:
  - перемещение тормозит
  - провести перемещение
  - программа не отвечает
  - зависает перемещение
  - долго перемещение
  facts: |
    Медленное перемещение товаров — обычно связано с ресурсами устройства или интернет-каналом.

    ПАРАМЕТРЫ:
    • Базовая скорость операции: обычно быстрая
    • Возможные причины замедления: перегруженное устройство или слабый интернет
    • Дальнейшее действие: проверка с поддержкой
- topic: stability_offline_002
  priority: 8
  keywords:
  - интернет пропадает
  - всё останавливается
  - офлайн-режим не работает
  - пропал интернет
  - нет интернета
  - без связи
  facts: |
    Работа при пропаже интернета — продолжение продаж в офлайн-режиме с автоматической синхронизацией.

    ПАРАМЕТРЫ:
    • Офлайн-режим: доступен
    • Продажи без интернета: доступны
    • Синхронизация: автоматическая после восстановления связи
- topic: stability_checkout_slow_001
  priority: 7
  keywords:
  - пробиваю товар
  - тормозит
  - клиенты нервничают
  - медленно пробивает
  - долго пробивает
  - пробитие тормозит
  facts: |
    Медленное пробитие товара — отклонение от нормального быстрого сценария.

    ПАРАМЕТРЫ:
    • Нормальное поведение: пробитие без задержек
    • Текущий симптом: замедление на кассе
    • Действие: диагностика конкретной точки,проверка скорости интернета
- topic: stability_search_slow_001
  priority: 7
  keywords:
  - касса тормозит
  - найти товар
  - очередь
  - поиск товара медленный
  - долго ищет товар
  - медленный поиск
  facts: |
    Медленный поиск товара — при нормальной работе поиск остаётся быстрым даже на большом каталоге.

    ПАРАМЕТРЫ:
    • Нормальная работа поиска: быстрая
    • Каталог: поддерживается большой список товаров
    • Типовая причина торможения: перегруженное устройство
- topic: stability_checkout_slow_002
  priority: 7
  keywords:
  - пробитие товара
  - пауза 3-5 секунд
  - 30 позиций
  - тормоза
  - медленное пробитие
  - долгое пробитие
  facts: |
    Паузы при пробитии чека — обычно решаются базовым обслуживанием приложения.

    ПАРАМЕТРЫ:
    • Нормальная скорость пробития: моментальная
    • При замедлении: обновить программу или очистить кэш
    • Поддержка: подсказывает порядок действий
- topic: stability_large_catalog_001
  priority: 6
  keywords:
  - больше товаров
  - система тормозит
  - много товаров
  - большой каталог
  - большая база
  - много позиций
  facts: |
    Большой каталог товаров — система рассчитана на работу с большими базами.

    ПАРАМЕТРЫ:
    • Поддержка большого каталога: да
    • При замедлениях: проверка настроек
    • Цель диагностики: ускорение работы
- topic: stability_catalog_freeze_001
  priority: 6
  keywords:
  - открываем каталог
  - виснет
  - не можем найти товар
  - каталог тормозит
