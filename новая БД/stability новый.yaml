  - открытие каталога
  facts: |
    Зависание каталога — при штатной работе каталог и поиск должны открываться быстро.

    ПАРАМЕТРЫ:
    • Нормальная работа каталога: быстрое открытие
    • Нормальная работа поиска: мгновенная
    • Инструменты: фильтры по категориям и складам
    • При отклонении: нужна диагностика
