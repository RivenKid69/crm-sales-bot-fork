  facts: |
    Централизованное управление сетью — управление всеми ключевыми сущностями из одного аккаунта.

    ПАРАМЕТРЫ:
    • Формат управления: централизованный
    • Единая точка входа: одна учётная запись
    • Объекты управления: товары, цены, акции, пользователи, отчёты
