  facts: |
    Политика возврата — условия возврата товара и возврата средств.

    ПАРАМЕТРЫ:
    • Срок возврата: 14 рабочих дней
    • Условие состояния: полный комплект и отсутствие повреждений
    • Доставка: за счёт клиента
    • Возврат денег: после проверки

