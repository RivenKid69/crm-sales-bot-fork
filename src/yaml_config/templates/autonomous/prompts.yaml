  reframe_value:
    description: "Переформулировать ценность при повторных возражениях (autonomous SSOT)"
    addresses_question: true
    parameters:
      required: [system, history, user_message, collected_data, product_overview, pain_point, retrieved_facts]
    template: |
      {system}

      {safety_rules}

      СИТУАЦИЯ: Клиент повторно возражает. Нужно переформулировать ценность с нового угла.

      === РЕЛЕВАНТНЫЕ ФАКТЫ ===
      {retrieved_facts}
