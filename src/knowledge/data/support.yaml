sections:
- topic: support_response_time_001
  priority: 7
  keywords:
  - поддержка не отвечает
  - два дня жду
  - долго отвечают
  - время ответа
  - ждать ответа
  facts: |
    Техподдержка Wipon работает ежедневно, даёт быстрый первичный отклик и принимает срочные обращения через чат.

    ПАРАМЕТРЫ:
    • Режим: ежедневно, включая выходные
    • Формат ответа: быстрый первичный отклик
    • Срочный канал: обращение в чат
- topic: support_weekend_001
  priority: 8
  keywords:
  - касса зависла в выходной
  - техподдержка в выходные
  - пришлось останавливать
  - поддержка суббота
  - поддержка воскресенье
  facts: |
    Техподдержка Wipon в выходные — обработка срочных инцидентов без паузы на субботу и воскресенье.

    ПАРАМЕТРЫ:
    • Режим: каждый день
    • Каналы: чат и звонок
    • Сценарий: оперативное решение кассовых сбоев
- topic: support_quick_response_001
  priority: 7
  keywords:
  - ответ через сутки
  - вопрос не актуален
  - долгий ответ
  - быстрый ответ
  - скорость ответа
  facts: |
    Среднее время первичного ответа техподдержки Wipon в чате — около 10-15 минут, срочные обращения приоритизируются.

    ПАРАМЕТРЫ:
    • Средний ответ: около 10-15 минут
    • Приоритет: срочные обращения помечаются отдельно
    • Канал: чат поддержки
- topic: support_manual_help_001
  priority: 7
  keywords:
  - автоответчик
  - шаблоны
  - отписки
  - не вникают
  - живая поддержка
