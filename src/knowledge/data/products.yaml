  facts: |
    Wipon Kassa — бесплатная онлайн-касса для малого и среднего бизнеса в Казахстане.

    ПАРАМЕТРЫ:
    • Касса + ОФД: в одном интерфейсе (не нужно отдельно подключать ОФД)
    • Устройства: работает на телефоне, планшете, ПК
    • Приём оплаты: наличные, карта, в долг
    • Чеки: автоматическая передача в ОФД
    • Маркировка товаров: поддерживается
    • Отправка чеков: через WhatsApp или email
    • Регистрация в ОФД и налоговом учёте: бесплатно
    • История операций: с фильтрацией
    • Стоимость: БЕСПЛАТНО при использовании программы учёта Wipon

- topic: wipon_pro
  priority: 9
  keywords:
  - алкоголь
