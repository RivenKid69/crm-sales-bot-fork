  facts: |
    Wipon Pro — сертифицированная система проверки алкогольной продукции через УКМ.

    ПАРАМЕТРЫ:
    • Назначение: считывание УКМ (учётно-контрольных марок)
    • Проверка подлинности: в базе Комитета госдоходов МФ РК в реальном времени
    • Защита от штрафов: за контрафакт (50-600 МРП + конфискация товара)
    • Жалобы: возможность отправить жалобу при обнаружении нарушений
    • Цена (смартфон): 12,000₸/год
    • Цена (ПК): 15,000₸/год
    • Цена (ТСД — терминал сбора данных): 30,000₸/год
    • Обязательность: по закону РК для всех продавцов алкоголя

