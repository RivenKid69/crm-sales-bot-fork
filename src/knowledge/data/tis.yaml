sections:
- topic: tis_how_works_181
  priority: 8
  keywords:
  - как работает тис
  - тис программа
  - тис отдельная программа
  - тис принцип работы
  - тис и налоговая
  facts: |
    ТИС — принцип работы трёхкомпонентной интегрированной системы.

    ПАРАМЕТРЫ:
    • Состав: комплекс из учёта, кассы и терминала
    • Фиксация: данные фиксируются и передаются в налоговую
    • Учёт оплат: наличные и безнал учитываются отдельно
- topic: tis_vs_regular_182
  priority: 8
  keywords:
  - тис отличие
  - тис и касса
  - тис и учёт
  - чем тис отличается
  - тис преимущества
