  - чем это лучше
  - обычная касса тис
  - в чём смысл тис
  - смысл тис
  - касса и так есть
  facts: |
    ТИС для ИП на упрощёнке — это не только касса, а утверждённая государством система с повышенными лимитами.

    ПАРАМЕТРЫ:
    • Статус: утверждён государством
    • Преимущество: даёт право повысить лимиты для ИП на упрощёнке
    • Отличие: это больше, чем просто касса или учёт
