- topic: tis_nds_threshold_188
  priority: 8
  keywords:
  - порог ндс
  - превысил ндс
  - полугодие
  - лимит ндс
  - ндс за год
  - ндс упрощёнка
  - попал под ндс
  - уже под ндс
  facts: |
    При превышении порога НДС ТИС подключить можно, но НДС уже сохраняется; помощь в сохранении упрощёнки актуальна, пока полугодовой лимит не превышен.

    ПАРАМЕТРЫ:
    • Подключение: можно, но НДС уже будет
    • Эффект: поможет сохранить упрощёнку, если полугодовой лимит не превышен
- topic: tis_general_regime_danger_189
  priority: 8
  keywords:
  - общеустановленный режим
  - переход на общий
  - опасность перехода
  - риски перехода
  - общая система
  - общий режим
  - общий режим налоги
  - бухгалтер налоги
  - переход общий налоги
  facts: |
    Переход на общеустановленный режим повышает налоговую нагрузку и объём учёта, чаще требует бухгалтера и увеличивает риск ошибок и штрафов.

    ПАРАМЕТРЫ:
    • Налоговая нагрузка: вырастает
    • Объём учёта: увеличивается
    • Последствия: чаще нужны бухгалтер и отчётность, выше риск ошибок и штрафов
