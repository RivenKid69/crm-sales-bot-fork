    При приближении к лимитам ТИС рекомендует заранее переходить на следующий режим, например Wipon Розница до 2 млрд ₸.

    ПАРАМЕТРЫ:
    • Рекомендация: заранее выбрать следующий режим
    • Решение: Wipon Розница на СНР с оборотами до 2 млрд ₸ в год
    • Поддержка: расчёт и помощь с переходом доступны через менеджера
