services:
  bot:
    build: .
    container_name: crm-sales-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-change-me-in-production}
      - DB_PATH=/app/data/conversations.db
      - EMBEDDING_CACHE_DIR=/app/data/embeddings-cache
      - OLLAMA_BASE_URL=http://host.docker.internal:8080
      - TEI_EMBED_URL=http://host.docker.internal:8081
      - TEI_RERANK_URL=http://host.docker.internal:8082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot_data:/app/data

volumes:
  bot_data:
