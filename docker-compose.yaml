services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "8080:11434"    # host:8080 -> ollama:11434 (для доступа снаружи)
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  bot:
    build: .
    container_name: crm-sales-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-change-me-in-production}
      - DB_PATH=/app/data/conversations.db
      - OLLAMA_BASE_URL=http://ollama:11434   # внутри docker-сети
      - EMBEDDER_DEVICE=cuda
    volumes:
      - bot_data:/app/data
      - hf_cache:/root/.cache/huggingface
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
  bot_data:
  hf_cache:
